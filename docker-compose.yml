version: '3.8'

services:
  # 追加: 自動HTTPS化リバースプロキシ
  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

  api:
    build: ./api
    # ports: "8000:8000" は削除（外部に直接公開しないため）
    expose:
      - "8000" # Docker内部のネットワーク(Caddy)からのみ見えるようにする
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - runner-base

  runner-base:
    build: ./runner
    image: my-judge-runner:latest
    command: ["true"]

# 証明書データを消えないように保存する領域
volumes:
  caddy_data:
  caddy_config:
